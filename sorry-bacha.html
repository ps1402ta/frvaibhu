<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorry Bacha 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Pacifico&display=swap');

  :root{
    --pink-bg-1:#fff0f5;
    --pink-bg-2:#ffd6e8;
    --pink-accent:#ff5ca0;
    --pink-deep:#ff2d87;
    --pink-soft:#ffe3ee;
    --text-dark:#7a3b56;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    height:100%;
    width:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 20%, #ffe6f0 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, #ffd2e6 0%, transparent 50%),
      linear-gradient(160deg, var(--pink-bg-1), var(--pink-bg-2));
    font-family:'Quicksand', sans-serif;
    position:relative;
  }

  .sky{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:1;
  }

  .falling{
    position:absolute;
    top:-40px;
    user-select:none;
    animation: fall linear forwards;
    will-change: transform;
  }

  @keyframes fall{
    to{
      transform: translateY(110vh) rotate(360deg);
    }
  }

  .stage{
    position:relative;
    z-index:5;
    height:100%;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    text-align:center;
    padding:20px;
  }

  .play-btn{
    position:fixed;
    top:18px;
    right:18px;
    z-index:10;
    width:48px;
    height:48px;
    border-radius:50%;
    border:none;
    background: linear-gradient(135deg, #ff8fc0, #ff2d87);
    color:#fff;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    box-shadow: 0 4px 14px rgba(255,45,135,0.4);
    transition: transform 0.2s ease;
  }
  .play-btn:hover{ transform: scale(1.08); }
  .play-btn:active{ transform: scale(0.94); }

  .sorry-btn{
    font-family:'Pacifico', cursive;
    font-size:clamp(40px, 9vw, 84px);
    background: linear-gradient(90deg, #ff6fb0, #ff2d87, #ff6fb0);
    background-size: 200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    cursor:pointer;
    user-select:none;
    animation: shine 3s linear infinite, pulse 2.2s ease-in-out infinite;
    filter: drop-shadow(0 4px 14px rgba(255,45,135,0.35));
  }

  @keyframes shine{
    to{ background-position: 200% center; }
  }
  @keyframes pulse{
    0%,100%{ transform: scale(1); }
    50%{ transform: scale(1.04); }
  }

  .sorry-btn:active{
    transform: scale(0.96);
  }

  .hint{
    font-size:14px;
    color:#a85d80;
    font-weight:600;
    opacity:0.8;
  }

  .panda{
    position:fixed;
    bottom:6px;
    left:10px;
    font-size:64px;
    z-index:6;
    animation: pandaSway 3.5s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
    user-select:none;
  }
  @keyframes pandaSway{
    0%,100%{ transform: rotate(-4deg) translateY(0); }
    50%{ transform: rotate(4deg) translateY(-4px); }
  }

  .butterfly{
    position:fixed;
    font-size:30px;
    z-index:7;
    cursor:pointer;
    user-select:none;
    animation: flutter 4s ease-in-out infinite;
    transition: transform 0.15s ease;
  }
  .butterfly:hover{
    transform: scale(1.2);
  }
  @keyframes flutter{
    0%,100%{ transform: translate(0,0) rotate(0deg); }
    25%{ transform: translate(12px,-14px) rotate(8deg); }
    50%{ transform: translate(-6px,-22px) rotate(-6deg); }
    75%{ transform: translate(-14px,-6px) rotate(6deg); }
  }

  .burst-heart{
    position:fixed;
    font-size:22px;
    pointer-events:none;
    z-index:8;
    animation: burstUp 1.1s ease-out forwards;
  }
  @keyframes burstUp{
    0%{ transform: translate(0,0) scale(0.6); opacity:1; }
    100%{ transform: translate(var(--dx), -140px) scale(1.1); opacity:0; }
  }

  .star-pop{
    position:fixed;
    font-size:20px;
    pointer-events:none;
    z-index:9;
    animation: popOut 0.7s ease-out forwards;
  }
  @keyframes popOut{
    0%{ transform: translate(0,0) scale(0.3) rotate(0deg); opacity:1; }
    100%{ transform: translate(var(--dx), var(--dy)) scale(1.3) rotate(180deg); opacity:0; }
  }

  .signature{
    align-self:flex-end;
    font-size:11px;
    font-weight:400;
    color:#000;
    opacity:1;
    z-index:6;
    user-select:none;
    margin-top:-12px;
  }

  audio{ display:none; }

  @media (prefers-reduced-motion: reduce){
    .falling, .sorry-btn, .panda, .butterfly{ animation:none !important; }
  }
</style>
</head>
<body>

  <div class="sky" id="sky"></div>

  <button class="play-btn" id="playBtn" aria-label="Play song">▶️</button>

  <div class="stage">
    <div class="sorry-btn" id="sorryBtn">Sorry Bacha</div>
    <div class="hint">(tap me, I mean it 🥺)</div>
    <div class="signature">@frvaibhu</div>
  </div>

  <div class="panda">🐼</div>

  <audio id="bgAudio" src="bby.mp3" loop></audio>

<script>
  const sky = document.getElementById('sky');
  const sorryBtn = document.getElementById('sorryBtn');
  const playBtn = document.getElementById('playBtn');
  const bgAudio = document.getElementById('bgAudio');

  const fallingEmojis = ['💕','💖','🌸','🌷','✨','💗','🌺'];
  const butterflyEmojis = ['🦋'];

  // ---------- Ambient hearts & flowers rain ----------
  function spawnFalling(){
    const el = document.createElement('div');
    el.className = 'falling';
    el.textContent = fallingEmojis[Math.floor(Math.random()*fallingEmojis.length)];
    const size = 14 + Math.random()*18;
    el.style.fontSize = size + 'px';
    el.style.left = Math.random()*100 + 'vw';
    const duration = 6 + Math.random()*6;
    el.style.animationDuration = duration + 's';
    sky.appendChild(el);
    setTimeout(()=> el.remove(), duration*1000 + 200);
  }
  setInterval(spawnFalling, 350);
  for(let i=0;i<10;i++){ setTimeout(spawnFalling, i*120); }

  // ---------- Play button -> play/pause song ----------
  playBtn.addEventListener('click', async () => {
    try{
      if(bgAudio.paused){
        await bgAudio.play();
        playBtn.textContent = '⏸️';
      } else {
        bgAudio.pause();
        playBtn.textContent = '▶️';
      }
    }catch(err){
      playBtn.textContent = '▶️';
      alert('Add a "bby.mp3" file next to this page first 🎵');
    }
  });

  // ---------- Heart burst from a point ----------
  function burstHearts(x, y, count=10){
    for(let i=0;i<count;i++){
      const h = document.createElement('div');
      h.className = 'burst-heart';
      h.textContent = fallingEmojis[Math.floor(Math.random()*fallingEmojis.length)];
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      const dx = (Math.random()*200 - 100) + 'px';
      h.style.setProperty('--dx', dx);
      document.body.appendChild(h);
      setTimeout(()=> h.remove(), 1200);
    }
  }

  // ---------- Spawn a butterfly ----------
  function spawnButterfly(){
    const b = document.createElement('div');
    b.className = 'butterfly';
    b.textContent = '🦋';
    const x = 10 + Math.random()*80;
    const y = 15 + Math.random()*60;
    b.style.left = x + 'vw';
    b.style.top = y + 'vh';
    document.body.appendChild(b);

    b.addEventListener('click', (e) => {
      const rect = b.getBoundingClientRect();
      blastStars(rect.left + rect.width/2, rect.top + rect.height/2);
      b.remove();
    });

    setTimeout(()=>{ if(b.parentNode) b.remove(); }, 9000);
  }

  // ---------- Star blast popup ----------
  function blastStars(x, y, count=12){
    const stars = ['⭐','✨','🌟'];
    for(let i=0;i<count;i++){
      const s = document.createElement('div');
      s.className = 'star-pop';
      s.textContent = stars[Math.floor(Math.random()*stars.length)];
      s.style.left = x + 'px';
      s.style.top = y + 'px';
      const angle = (Math.PI*2*i)/count;
      const dist = 60 + Math.random()*60;
      s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
      s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
      document.body.appendChild(s);
      setTimeout(()=> s.remove(), 800);
    }
  }

  // ---------- Sorry Bacha click ----------
  sorryBtn.addEventListener('click', (e) => {
    const rect = sorryBtn.getBoundingClientRect();
    const x = rect.left + rect.width/2;
    const y = rect.top + rect.height/2;
    burstHearts(x, y, 14);

    if(Math.random() < 0.6){
      spawnButterfly();
    }
  });
</script>

</body>
</html>
